<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login | GhanaTrust Bank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-container {
            background: var(--white);
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 450px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--primary);
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .logo svg {
            width: 2rem;
            height: 2rem;
        }

        .login-header h2 {
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--text-main);
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }

        .btn {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--primary-dark);
        }

        .btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }

        .footer-links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .modal {
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 0;
            border-radius: 1rem;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .modal-header h3 {
            margin: 0;
            color: #1e293b;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #64748b;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            padding: 1.5rem;
            border-top: 1px solid #e5e7eb;
        }

        .btn-secondary {
            background: #64748b;
            color: white;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .success-message {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #059669;
            padding: 0.75rem;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <a href="index.html" class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="7" width="20" height="14" rx="2"></rect>
                    <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                </svg>
                <span>GhanaTrust Bank</span>
            </a>
            <h2>Welcome Back</h2>
            <p>Enter your credentials to access your account</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="loginBtn" class="btn">Sign In</button>
        </form>

        <div class="footer-links">
            Don't have an account? <a href="account-opening-new.html">Open an account</a><br><br>
            <a href="#" onclick="showForgetPasswordModal()" style="color: #1e40af; text-decoration: none;">Forgot Password?</a><br><br>
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <!-- Forget Password Modal -->
    <div id="forgetPasswordModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Reset Password</h3>
                <button class="close-btn" onclick="closeForgetPasswordModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p>Please contact admin for a password reset code. Enter your email and the reset code below.</p>
                <div class="form-group">
                    <label for="resetEmail">Email Address</label>
                    <input type="email" id="resetEmail" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="resetCode">Reset Code</label>
                    <input type="text" id="resetCode" placeholder="Enter 6-digit code" maxlength="6" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                </div>
                <div id="resetErrorMessage" class="error-message"></div>
                <div id="resetSuccessMessage" class="success-message" style="display: none; text-align: center; color: #059669; margin-top: 1rem;"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeForgetPasswordModal()">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="resetPassword()">Reset Password</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBC6abatrIxH9gFaXQx8Q4gDdu59dU1U8E",
            authDomain: "live-chat-61efd.firebaseapp.com",
            databaseURL: "https://live-chat-61efd-default-rtdb.firebaseio.com",
            projectId: "live-chat-61efd",
            storageBucket: "live-chat-61efd.firebasestorage.app",
            messagingSenderId: "1059519432349",
            appId: "1:1059519432349:web:a40c6fee6357651c6af674",
            measurementId: "G-W8CFYEYHJ4"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        const usersRef = database.ref('users');
        
        // Global variables
        let currentUserData;

        // Login handler
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');

            btn.disabled = true;
            btn.innerText = "Verifying...";
            errorDiv.style.display = 'none';

            try {
                console.log('=== LOGIN ATTEMPT ===');
                console.log('Email:', email);
                
                const snapshot = await usersRef.orderByChild('email').equalTo(email).once('value');
                
                if (snapshot.exists()) {
                    let userFound = false;
                    let userData = null;
                    let userId = null;
                    
                    snapshot.forEach((childSnapshot) => {
                        userData = childSnapshot.val();
                        userId = childSnapshot.key;
                        
                        if (userData.password === password) {
                            userFound = true;
                            currentUserData = {
                                userId: userId,
                                firstName: userData.firstName,
                                lastName: userData.lastName,
                                email: userData.email,
                                accountType: userData.accountType
                            };
                        }
                    });
                    
                    if (userFound) {
                        console.log('Login successful');
                        localStorage.setItem('currentUser', JSON.stringify(currentUserData));
                        window.location.href = 'dashboard.html';
                    } else {
                        showError('Invalid password');
                    }
                } else {
                    showError('No account found with this email');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Login failed. Please try again.');
            }
            
            btn.disabled = false;
            btn.innerText = "Sign In";
        }
        
        // Forget Password Modal
        function showForgetPasswordModal() {
            console.log('Opening forget password modal');
            const modal = document.getElementById('forgetPasswordModal');
            if (modal) {
                modal.style.display = 'flex';
                document.getElementById('resetErrorMessage').style.display = 'none';
                document.getElementById('resetSuccessMessage').style.display = 'none';
            }
        }
        
        function closeForgetPasswordModal() {
            const modal = document.getElementById('forgetPasswordModal');
            if (modal) {
                modal.style.display = 'none';
                document.getElementById('resetEmail').value = '';
                document.getElementById('resetCode').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            }
        }
        
        // Error/Success messages
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerText = message;
            errorDiv.style.display = 'block';
        }
        
        function showResetError(message) {
            const errorDiv = document.getElementById('resetErrorMessage');
            errorDiv.innerText = message;
            errorDiv.style.display = 'block';
            document.getElementById('resetSuccessMessage').style.display = 'none';
        }
        
        function showResetSuccess(message) {
            const successDiv = document.getElementById('resetSuccessMessage');
            successDiv.innerText = message;
            successDiv.style.display = 'block';
            document.getElementById('resetErrorMessage').style.display = 'none';
        }
        
        // Password Reset
        async function resetPassword() {
            const email = document.getElementById('resetEmail').value.trim();
            const resetCode = document.getElementById('resetCode').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!email || !resetCode || !newPassword || !confirmPassword) {
                showResetError('Please fill in all fields');
                return;
            }

            if (newPassword !== confirmPassword) {
                showResetError('Passwords do not match');
                return;
            }

            try {
                const snapshot = await usersRef.orderByChild('email').equalTo(email).once('value');
                
                if (snapshot.exists()) {
                    let userData = null;
                    let userId = null;
                    
                    snapshot.forEach((childSnapshot) => {
                        userData = childSnapshot.val();
                        userId = childSnapshot.key;
                    });
                    
                    if (userData.resetCode === resetCode) {
                        await usersRef.child(userId).update({
                            password: newPassword,
                            resetCode: null,
                            resetCodeExpiry: null
                        });
                        
                        showResetSuccess('Password reset successfully!');
                        setTimeout(() => {
                            closeForgetPasswordModal();
                            window.location.reload();
                        }, 2000);
                    } else {
                        showResetError('Invalid reset code');
                    }
                } else {
                    showResetError('No account found with this email');
                }
            } catch (error) {
                console.error('Reset error:', error);
                showResetError('Failed to reset password. Please try again.');
            }
        }
    </script>
    
    <!-- Ghana Trust Bank Live Chat Widget -->
    <script src="chat.js"></script>
</body>
</html>
